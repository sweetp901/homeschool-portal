function darken(hex,f=0.70){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);const h=n=>Math.max(0,Math.min(255,Math.round(n))).toString(16).padStart(2,'0');return'#'+h(r*f)+h(g*f)+h(b*f);}
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function getTheme(state){
  if(state.customAccent&&/^#[0-9A-Fa-f]{6}$/.test(state.customAccent)){const a=state.customAccent;return{a,d:darken(a),l:rgba(a,0.18),p:rgba(a,0.08)};}
  return THEMES[state.themeIdx]||THEMES[0];
}
function gradeLabel(s){return s>=90?'A':s>=80?'B':s>=70?'C':'D';}
function gradeColor(s){return s>=90?'#2a7a6f':s>=80?'#3d6b9e':s>=70?'#c9973a':'#b85c5c';}

// ── GOOGLE DRIVE HELPERS ──
async function driveRequest(token, url, options={}){
  const res = await fetch(url, {
    ...options,
    headers:{'Authorization':'Bearer '+token, 'Content-Type':'application/json', ...(options.headers||{})},
  });
  if(!res.ok) throw new Error('Drive error: '+res.status);
  return res.json();
}

async function findFile(token){
  const res = await driveRequest(token, `${DRIVE_API}/files?q=name='${FILE_NAME}'+and+trashed=false&fields=files(id,name,modifiedTime)`);
  return res.files&&res.files.length>0 ? res.files[0] : null;
}

async function loadFromDrive(token){
  const file = await findFile(token);
  if(!file) return null;
  const res = await fetch(`${DRIVE_API}/files/${file.id}?alt=media`, {
    headers:{'Authorization':'Bearer '+token}
  });
  if(!res.ok) throw new Error('Could not download file');
  return res.json();
}

async function saveToDrive(token, data, existingFileId=null){
  const body = JSON.stringify(data, null, 2);
  const meta = {name:FILE_NAME, mimeType:'application/json'};
  if(existingFileId){
    // Update existing file
    const boundary='homeschool_boundary';
    const multipart = `--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(meta)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${body}\r\n--${boundary}--`;
    const res = await fetch(`${UPLOAD_API}/files/${existingFileId}?uploadType=multipart`, {
      method:'PATCH',
      headers:{'Authorization':'Bearer '+token,'Content-Type':`multipart/related; boundary=${boundary}`},
      body:multipart
    });
    if(!res.ok) throw new Error('Update failed: '+res.status);
    return (await res.json()).id;
  } else {
    // Create new file
    const boundary='homeschool_boundary';
    const multipart = `--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(meta)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${body}\r\n--${boundary}--`;
    const res = await fetch(`${UPLOAD_API}/files?uploadType=multipart`, {
      method:'POST',
      headers:{'Authorization':'Bearer '+token,'Content-Type':`multipart/related; boundary=${boundary}`},
      body:multipart
    });
    if(!res.ok) throw new Error('Create failed: '+res.status);
    return (await res.json()).id;
  }
}

// ── GOOGLE SIGN IN PAGE ──
function SignInPage({onToken}){
  const [error,setError]=useState('');
  const [loading,setLoading]=useState(false);

  useEffect(()=>{
    // Try to restore token from sessionStorage
    const saved = sessionStorage.getItem('hs_token');
    if(saved) { onToken(saved); return; }

    const interval = setInterval(()=>{
      if(window.google){
        clearInterval(interval);
        window.google.accounts.id.initialize({
          client_id: CLIENT_ID,
          callback: ()=>{},
        });
      }
    },200);
    return ()=>clearInterval(interval);
  },[]);

  const signIn=()=>{
    setLoading(true);
    setError('');
    const client = window.google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback:(resp)=>{
        setLoading(false);
        if(resp.error){setError('Sign in failed: '+resp.error);return;}
        sessionStorage.setItem('hs_token', resp.access_token);
        onToken(resp.access_token);
      },
    });
    client.requestAccessToken();
  };

  return (
    <div style={{minHeight:'100vh',background:'#f7f5f0',display:'flex',alignItems:'center',justifyContent:'center',padding:'2rem'}}>
      <div style={{background:'#fff',borderRadius:20,padding:'3rem',maxWidth:440,width:'100%',border:'1px solid #e8e2d9',textAlign:'center'}}>

        <p style={{fontSize:13,color:'#8a847c',lineHeight:1.7,marginBottom:28}}>Track attendance, grades, progress, and curriculum — all saved automatically to your own Google Drive. Each family's data stays completely private.</p>

        <div style={{background:'#f7f5f0',borderRadius:12,padding:'1.25rem',marginBottom:24,textAlign:'left'}}>
          {[['🔒','Your data saves to YOUR Google Drive only'],['👨‍👩‍👧','Each family uses their own Google account'],['☁️','Access from any device, anywhere'],['📋','Works for any student, any curriculum']].map(([icon,text])=>(
            <div key={text} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10,fontSize:13,color:'#4a4540'}}>
              <span style={{fontSize:16}}>{icon}</span><span>{text}</span>
            </div>
          ))}
        </div>

        <button onClick={signIn} disabled={loading} style={{width:'100%',padding:'13px',borderRadius:10,border:'1px solid #e8e2d9',background:'#fff',cursor:loading?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:10,fontSize:14,fontWeight:600,color:'#1a1714',transition:'all 0.15s',opacity:loading?0.7:1}}>
          <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          {loading ? 'Connecting...' : 'Sign in with Google'}
        </button>

        {error&&<div style={{marginTop:12,padding:'10px 14px',background:'#FDF2F2',borderRadius:8,fontSize:12,color:'#b85c5c',border:'1px solid #F5D9D9'}}>{error}</div>}

        <p style={{fontSize:11,color:'#b0aa9f',marginTop:20,lineHeight:1.6}}>
          This app only accesses files it creates. It cannot read any other files in your Google Drive. Your data is never shared with anyone.

// ── DASHBOARD ──
function Dashboard({state,theme}){
  const days=Object.values(state.attendance).filter(v=>v==='present').length;
  const req=state.profile.requiredDays||180;
  const pct=Math.round(days/req*100);
  const avg=state.grades.length?Math.round(state.grades.reduce((a,g)=>a+g.score,0)/state.grades.length):null;
  let streak=0,d=new Date(today);
  while(true){const k=d.toISOString().split('T')[0];if(state.attendance[k]==='present'){streak++;d.setDate(d.getDate()-1);}else break;}
  const rDone=state.milestones.reading.filter(Boolean).length,mDone=state.milestones.math.filter(Boolean).length;
  const dayIdx=today.getDay(),dk=['sun','mon','tue','wed','thu','fri','sat'][dayIdx];
  const todayRows=state.schedule.filter(r=>r.type!=='break'&&r[dk]);
  const month=today.getMonth(),year=today.getFullYear();
  const pfx=`${year}-${String(month+1).padStart(2,'0')}`;
  const mE=Object.entries(state.attendance).filter(([k])=>k.startsWith(pfx));
  const mP=mE.filter(([,v])=>v==='present').length,mA=mE.filter(([,v])=>v==='absent').length,mEx=mE.filter(([,v])=>v==='excused').length;
  const recent=[...state.grades].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
  const SC=({num,label,sub})=><div style={{background:'#fff',border:'1px solid #e8e2d9',borderRadius:12,padding:'1rem',textAlign:'center'}}><div style={{fontSize:28,fontWeight:800,color:theme.a}}>{num}</div><div style={{fontSize:11,fontWeight:600,color:'#8a847c',marginTop:2}}>{label}</div>{sub&&<div style={{fontSize:10,color:'#b0aa9f',marginTop:2}}>{sub}</div>}</div>;
  return <div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:16}}>
      <SC num={days} label="Days Completed" sub={`of ${req} required`}/>
      <SC num={pct+'%'} label="Year Progress" sub={`${req-days} days left`}/>
      <SC num={avg!==null?avg+'%':'--'} label="Current Average" sub="all subjects"/>
      <SC num={streak} label="Day Streak" sub="consecutive days"/>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16,marginBottom:16}}>
      <Card>
        <ST>Subject Averages</ST>
        {state.subjects.map(s=>{const sg=state.grades.filter(g=>g.subject===s);const a=sg.length?Math.round(sg.reduce((x,g)=>x+g.score,0)/sg.length):0;return <div key={s} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}><div style={{fontSize:12,color:'#4a4540',width:130,flexShrink:0}}>{s}</div><div style={{flex:1,height:7,background:'#e8e2d9',borderRadius:99,overflow:'hidden'}}><div style={{height:'100%',width:sg.length?a+'%':'0%',background:theme.a,borderRadius:99,transition:'width 0.5s'}}/></div><div style={{fontSize:11,fontWeight:700,color:'#4a4540',width:32,textAlign:'right'}}>{sg.length?a+'%':'--'}</div></div>;})}
      </Card>
      <Card>
        <ST>Today - {today.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})}</ST>
        {todayRows.length?todayRows.map((r,i)=>{const parts=(r[dk]||'').split('|');return <div key={i} style={{display:'flex',gap:8,alignItems:'center',marginBottom:7}}><span style={{fontSize:10,color:'#b0aa9f',width:70,flexShrink:0}}>{r.time}</span><span style={{fontSize:12,fontWeight:600}}>{parts[0]}</span></div>;}): <div style={{fontSize:12,color:'#b0aa9f'}}>No school today</div>}
        <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid #e8e2d9'}}><ST>Milestones</ST><div style={{fontSize:12,color:theme.a,fontWeight:700}}>{rDone+mDone}/{READ_MS.length+MATH_MS.length} completed</div><div style={{fontSize:11,color:'#8a847c',marginTop:2}}>Reading: {rDone}/{READ_MS.length} · Math: {mDone}/{MATH_MS.length}</div></div>
      </Card>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
      <Card>
        <ST>Recent Grades</ST>
        {recent.length?<table style={{width:'100%',borderCollapse:'collapse'}}><thead><tr>{['Subject','Assignment','Date','Grade'].map(h=><th key={h} style={{textAlign:'left',fontSize:10,fontWeight:700,color:'#8a847c',textTransform:'uppercase',letterSpacing:'0.05em',padding:'4px 8px',borderBottom:'1px solid #e8e2d9'}}>{h}</th>)}</tr></thead><tbody>{recent.map((g,i)=><tr key={i}><td style={{padding:'7px 8px',fontSize:12}}><Tag color={theme.a}>{g.subject.split(' ')[0]}</Tag></td><td style={{padding:'7px 8px',fontSize:12}}>{g.assignment}</td><td style={{padding:'7px 8px',fontSize:11,color:'#8a847c'}}>{g.date}</td><td style={{padding:'7px 8px'}}><GradePill score={g.score}/></td></tr>)}</tbody></table>:<div style={{fontSize:12,color:'#b0aa9f',padding:'8px 0'}}>No grades yet</div>}
      </Card>
      <Card>
        <ST>This Month - {MONTHS[month]}</ST>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:12}}>{[['Present',mP,'#2a7a6f'],['Absent',mA,'#b85c5c'],['Excused',mEx,theme.a]].map(([l,n,c])=><div key={l} style={{textAlign:'center',padding:'10px 0',background:'#f7f5f0',borderRadius:8}}><div style={{fontSize:22,fontWeight:700,color:c}}>{n}</div><div style={{fontSize:10,color:'#8a847c',marginTop:2}}>{l}</div></div>)}</div>
        {state.wins.slice(-3).reverse().map((w,i)=><div key={i} style={{display:'flex',gap:6,marginBottom:6,fontSize:12}}><span>🌟</span><span style={{color:'#4a4540'}}>{w.text}</span></div>)}
      </Card>
    </div>
  </div>;
}

// ── ATTENDANCE ──
function Attendance({state,setState,theme}){
  const [month,setMonth]=useState(today.getMonth());
  const [year,setYear]=useState(today.getFullYear());
  const first=new Date(year,month,1).getDay(),dim=new Date(year,month+1,0).getDate();
  const cycle={'':'present','present':'absent','absent':'excused','excused':''};
  const toggle=key=>setState(s=>{const a={...s.attendance},next=cycle[a[key]||''];if(next)a[key]=next;else delete a[key];return{...s,attendance:a};});
  const pfx=`${year}-${String(month+1).padStart(2,'0')}`;
  const entries=Object.entries(state.attendance).filter(([k])=>k.startsWith(pfx));
  const pC=entries.filter(([,v])=>v==='present').length,aC=entries.filter(([,v])=>v==='absent').length,eC=entries.filter(([,v])=>v==='excused').length;
  const ytd=Object.values(state.attendance).filter(v=>v==='present').length;
  return <Card>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,flexWrap:'wrap',gap:8}}>
      <div style={{fontWeight:700,fontSize:16}}>Attendance Log</div>
      <div style={{display:'flex',gap:8}}>
        <Sel value={month} onChange={v=>setMonth(Number(v))} style={{width:'auto'}}>{MONTHS.map((m,i)=><option key={m} value={i}>{m}</option>)}</Sel>
        <Sel value={year} onChange={v=>setYear(Number(v))} style={{width:'auto'}}>{[2024,2025,2026,2027,2028].map(y=><option key={y}>{y}</option>)}</Sel>
      </div>
    </div>
    <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
      <Tag color="#2a7a6f">● Present</Tag><Tag color="#b85c5c">● Absent</Tag><Tag color={theme.a}>● Excused</Tag>
      <span style={{fontSize:11,color:'#b0aa9f'}}>Click date to cycle</span>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4,marginBottom:14}}>
      {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=><div key={d} style={{textAlign:'center',fontSize:10,fontWeight:700,color:'#8a847c',padding:'4px 0'}}>{d}</div>)}
      {Array(first).fill(null).map((_,i)=><div key={'e'+i}/>)}
      {Array(dim).fill(null).map((_,i)=>{
        const d=i+1,key=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,status=state.attendance[key]||'',isT=key===todayKey;
        const bg=status==='present'?'#EEF8F6':status==='absent'?'#FDF2F2':status==='excused'?theme.p:'transparent';
        const color=status==='present'?'#2a7a6f':status==='absent'?'#b85c5c':status==='excused'?theme.d:'#4a4540';
        const border=status==='present'?'1px solid #D4EDEA':status==='absent'?'1px solid #F5D9D9':status==='excused'?`1px solid ${theme.l}`:'1px solid #e8e2d9';
        return <div key={d} onClick={()=>toggle(key)} style={{aspectRatio:1,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,cursor:'pointer',fontWeight:isT?800:500,background:bg,color,border,outline:isT?`2px solid ${theme.a}`:'none',outlineOffset:1}}>{d}</div>;
      })}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
      {[['Present',pC,'#2a7a6f'],['Absent',aC,'#b85c5c'],['Excused',eC,theme.a],['YTD Total',ytd,'#1a1714']].map(([l,n,c])=><div key={l} style={{textAlign:'center',padding:'10px 0',background:'#f7f5f0',borderRadius:8}}><div style={{fontSize:22,fontWeight:700,color:c}}>{n}</div><div style={{fontSize:10,color:'#8a847c',marginTop:2}}>{l}</div></div>)}
    </div>
  </Card>;
}

// ── GRADES ──
function Grades({state,setState,theme}){
  const [subj,setSubj]=useState(state.subjects[0]||'');
  const [assign,setAssign]=useState('');
  const [score,setScore]=useState('');
  const [date,setDate]=useState(todayKey);
  const [filter,setFilter]=useState('all');
  const [collapsed,setCollapsed]=useState({});
  const add=()=>{const s=parseInt(score);if(isNaN(s)||s<0||s>100)return;setState(st=>({...st,grades:[...st.grades,{subject:subj,assignment:assign||'Assignment',score:s,date,id:Date.now()}]}));setAssign('');setScore('');};
  const del=id=>setState(st=>({...st,grades:st.grades.filter(g=>g.id!==id)}));
  const toggle=s=>setCollapsed(c=>({...c,[s]:!c[s]}));
  const subjects=state.subjects.filter(s=>filter==='all'||s===filter);
  return <Card>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,flexWrap:'wrap',gap:8}}>
      <div style={{fontWeight:700,fontSize:16}}>Grade Book</div>
      <Sel value={filter} onChange={setFilter} style={{width:'auto'}}><option value="all">All Subjects</option>{state.subjects.map(s=><option key={s}>{s}</option>)}</Sel>
    </div>
    <div style={{padding:'12px 14px',background:'#f7f5f0',borderRadius:10,marginBottom:16,borderLeft:`3px solid ${theme.a}`}}>
      <ST>Add New Entry</ST>
      <div style={{display:'grid',gridTemplateColumns:'1.5fr 1.5fr 0.8fr 0.8fr auto',gap:8,alignItems:'flex-end'}}>
        <div><div style={{fontSize:10,fontWeight:700,color:'#8a847c',textTransform:'uppercase',marginBottom:3}}>Subject</div><Sel value={subj} onChange={setSubj} style={{width:'100%'}}>{state.subjects.map(s=><option key={s}>{s}</option>)}</Sel></div>
        <div><div style={{fontSize:10,fontWeight:700,color:'#8a847c',textTransform:'uppercase',marginBottom:3}}>Assignment</div><Inp value={assign} onChange={setAssign} placeholder="e.g. Lesson 4 quiz"/></div>
        <div><div style={{fontSize:10,fontWeight:700,color:'#8a847c',textTransform:'uppercase',marginBottom:3}}>Score %</div><Inp value={score} onChange={setScore} type="number" placeholder="85"/></div>
        <div><div style={{fontSize:10,fontWeight:700,color:'#8a847c',textTransform:'uppercase',marginBottom:3}}>Date</div><Inp value={date} onChange={setDate} type="date"/></div>
        <Btn onClick={add} style={{background:theme.a,color:'#fff',alignSelf:'flex-end'}}>Add</Btn>
      </div>
    </div>
    {subjects.map(s=>{
      const sg=state.grades.filter(g=>g.subject===s).sort((a,b)=>new Date(b.date)-new Date(a.date));
      if(!sg.length)return null;
      const avg=Math.round(sg.reduce((a,g)=>a+g.score,0)/sg.length);const c=gradeColor(avg);
      return <div key={s} style={{marginBottom:12}}>
        <div onClick={()=>toggle(s)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',background:'#f7f5f0',borderRadius:10,cursor:'pointer',border:'1px solid #e8e2d9',marginBottom:collapsed[s]?0:4}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}><GradePill score={avg}/><span style={{fontWeight:600,fontSize:13}}>{s}</span><Tag color={theme.a}>{sg.length} {sg.length===1?'entry':'entries'}</Tag></div>
          <div style={{display:'flex',alignItems:'center',gap:10}}><span style={{fontSize:20,fontWeight:700,color:c}}>{avg}%</span><span style={{color:'#8a847c',fontSize:12}}>{collapsed[s]?'▸':'▾'}</span></div>
        </div>
        {!collapsed[s]&&<table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
          <thead><tr>{['Assignment','Date','Score','Grade',''].map(h=><th key={h} style={{textAlign:'left',fontSize:10,fontWeight:700,color:'#8a847c',textTransform:'uppercase',padding:'6px 10px',borderBottom:'1px solid #e8e2d9'}}>{h}</th>)}</tr></thead>
          <tbody>{sg.map(g=><tr key={g.id}><td style={{padding:'8px 10px'}}>{g.assignment}</td><td style={{padding:'8px 10px',color:'#8a847c'}}>{g.date}</td><td style={{padding:'8px 10px'}}>{g.score}%</td><td style={{padding:'8px 10px'}}><GradePill score={g.score}/></td><td style={{padding:'8px 10px'}}><button onClick={()=>del(g.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#b0aa9f'}}>x</button></td></tr>)}</tbody>
        </table>}
      </div>;
    })}
    {!state.grades.length&&<div style={{fontSize:13,color:'#b0aa9f',padding:'1rem 0'}}>No grades yet. Use the form above to add entries.</div>}
  </Card>;
}

// ── REPORTS ──
function Reports({state,theme}){
  const [preview,setPreview]=useState(null);
  const p=state.profile;
  const generate=type=>{
    const req=p.requiredDays||180,days=Object.values(state.attendance).filter(v=>v==='present').length,abs=Object.values(state.attendance).filter(v=>v==='absent').length;
    let sections=[];
    if(type==='attendance'||type==='all')sections.push({title:'Attendance Summary',content:[`Days Present (YTD): ${days} of ${req} required (${Math.round(days/req*100)}%)`,`Days Absent: ${abs}`,`Days Excused: ${Object.values(state.attendance).filter(v=>v==='excused').length}`]});
    if(type==='grades'||type==='all'){const rows=state.subjects.map(s=>{const sg=state.grades.filter(g=>g.subject===s);if(!sg.length)return null;const avg=Math.round(sg.reduce((a,g)=>a+g.score,0)/sg.length);return`${s}: ${avg}% (${gradeLabel(avg)}) - ${sg.length} entries`;}).filter(Boolean);const ov=state.grades.length?Math.round(state.grades.reduce((a,g)=>a+g.score,0)/state.grades.length):null;if(ov!==null)rows.push(`Overall Average: ${ov}% (${gradeLabel(ov)})`);sections.push({title:'Grade Report',content:rows.length?rows:['No grades logged yet']});}
    if(type==='progress'||type==='all'){const rD=state.milestones.reading.filter(Boolean).length,mD=state.milestones.math.filter(Boolean).length;const rows=[`Reading Milestones: ${rD}/${READ_MS.length} completed`,`Math Milestones: ${mD}/${MATH_MS.length} completed`];if(state.notes.reading)rows.push(`Reading Notes: ${state.notes.reading}`);if(state.notes.math)rows.push(`Math Notes: ${state.notes.math}`);if(state.notes.ela)rows.push(`Language Arts: ${state.notes.ela}`);if(state.notes.science)rows.push(`Science/SS: ${state.notes.science}`);sections.push({title:'Progress Report',content:rows});}
    setPreview({sections});
  };
  return <div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
      {[{type:'attendance',icon:'📅',name:'Attendance Report',desc:'Full year log. Required for TN superintendent by June 30.'},{type:'grades',icon:'📊',name:'Grade Report',desc:'All grades by subject with averages.'},{type:'progress',icon:'📈',name:'Progress Narrative',desc:'Milestones, notes, and wins.'},{type:'all',icon:'📋',name:'Complete Portfolio',desc:'All reports combined.'}].map(c=><div key={c.type} onClick={()=>generate(c.type)} style={{background:'#fff',border:'1px solid #e8e2d9',borderRadius:12,padding:'1.25rem',cursor:'pointer',transition:'all 0.15s'}} onMouseEnter={e=>{e.currentTarget.style.borderColor=theme.a;}} onMouseLeave={e=>{e.currentTarget.style.borderColor='#e8e2d9';}}><div style={{fontSize:26,marginBottom:8}}>{c.icon}</div><div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{c.name}</div><div style={{fontSize:11,color:'#8a847c',lineHeight:1.5,marginBottom:10}}>{c.desc}</div><Tag color={theme.a}>Generate</Tag></div>)}
    </div>
    {preview&&<Card>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',borderBottom:'2px solid #1a1714',paddingBottom:12,marginBottom:16}}>
        <div><div style={{fontWeight:700,fontSize:18}}>{p.studentName||'Student'}</div><div style={{fontSize:11,color:'#8a847c',marginTop:2}}>{p.grade} · {p.schoolName} · {p.schoolYear}</div></div>
        <div style={{textAlign:'right',fontSize:11,color:'#8a847c'}}><div>Parent-Teacher: {p.parentName}</div><div>Generated: {today.toLocaleDateString()}</div></div>
      </div>
      {preview.sections.map((sec,i)=><div key={i} style={{marginBottom:16}}><div style={{fontWeight:700,fontSize:15,marginBottom:8,borderBottom:'1px solid #e8e2d9',paddingBottom:4}}>{sec.title}</div>{sec.content.map((line,j)=><div key={j} style={{fontSize:13,color:'#4a4540',marginBottom:4,lineHeight:1.6}}>{line}</div>)}</div>)}
      <div style={{display:'flex',gap:8,marginTop:16}} className="no-print">
        <Btn onClick={()=>window.print()} style={{background:theme.a,color:'#fff'}}>Print Report</Btn>
        <Btn onClick={()=>setPreview(null)} style={{background:'#f7f5f0',color:'#4a4540',border:'1px solid #e8e2d9'}}>Close</Btn>
      </div>
    </Card>}
  </div>;
}

  const [state,setState]=useState(JSON.parse(JSON.stringify(INIT)));
  const [page,setPage]=useState('Dashboard');
  const [ql,setQl]=useState(false);
  const [qlSubj,setQlSubj]=useState('');
  const [qlScore,setQlScore]=useState('');
  const [qlWin,setQlWin]=useState('');
  const [saveStatus,setSaveStatus]=useState('idle'); // idle | saving | saved | error
  const [fileId,setFileId]=useState(null);
  const [loading,setLoading]=useState(true);
  const saveTimer=useRef(null);
  const theme=useMemo(()=>getTheme(state),[state.themeIdx,state.customAccent]);

  // Load data on mount
  useEffect(()=>{
    setLoading(true);
    loadFromDrive(token)
      .then(data=>{
        if(data){
          setState(s=>({...JSON.parse(JSON.stringify(INIT)),...data}));
        }
        // Get file ID for future saves
        return findFile(token);
      })
      .then(file=>{ if(file) setFileId(file.id); })
      .catch(err=>console.warn('Load error:',err))
      .finally(()=>setLoading(false));
  },[token]);

  // Auto-save whenever state changes (debounced 2s)
  useEffect(()=>{
    if(loading) return;
    if(saveTimer.current) clearTimeout(saveTimer.current);
    setSaveStatus('saving');
    saveTimer.current=setTimeout(async()=>{
      try{
        const id=await saveToDrive(token,state,fileId);
        if(!fileId) setFileId(id);
        setSaveStatus('saved');
        setTimeout(()=>setSaveStatus('idle'),2500);
      }catch(err){
        console.error('Save error:',err);
        setSaveStatus('error');
        setTimeout(()=>setSaveStatus('idle'),4000);
      }
    },2000);
    return ()=>{ if(saveTimer.current) clearTimeout(saveTimer.current); };
  },[state,loading]);

  const logAtt=status=>setState(s=>{const a={...s.attendance};a[todayKey]=status;return{...s,attendance:a};});
  const qGrade=()=>{const s=parseInt(qlScore);if(isNaN(s)||s<0||s>100)return;setState(st=>({...st,grades:[...st.grades,{subject:qlSubj||state.subjects[0],assignment:'Daily work',score:s,date:todayKey,id:Date.now()}]}));setQlScore('');};
  const qWin=()=>{if(!qlWin.trim())return;setState(s=>({...s,wins:[...s.wins,{text:qlWin,date:todayKey}]}));setQlWin('');};

  const SaveBadge=()=>{
    const configs={saving:{bg:'#FBF5E8',color:'#8f6a28',text:'Saving to Drive...'},saved:{bg:'#EEF8F6',color:'#2a7a6f',text:'Saved to Drive ✓'},error:{bg:'#FDF2F2',color:'#b85c5c',text:'Save failed — check connection'},idle:{bg:'transparent',color:'#8a847c',text:'Auto-saves to Google Drive'}};
    const cfg=configs[saveStatus]||configs.idle;
    return <span style={{padding:'4px 10px',borderRadius:99,fontSize:11,fontWeight:600,background:cfg.bg,color:cfg.color,transition:'all 0.3s'}}>{cfg.text}</span>;
  };

  const pages={
    Dashboard:<Dashboard state={state} theme={theme}/>,
    Schedule:<Schedule state={state}/>,
    Attendance:<Attendance state={state} setState={setState} theme={theme}/>,
    Grades:<Grades state={state} setState={setState} theme={theme}/>,
    Progress:<Progress state={state} setState={setState} theme={theme}/>,
    Reports:<Reports state={state} theme={theme}/>,
    Settings:<Settings state={state} setState={setState} theme={theme}/>,
  };

  if(loading) return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f7f5f0',flexDirection:'column',gap:16}}>
    <div style={{fontSize:32}}>☁️</div>
    <div style={{fontSize:14,color:'#8a847c',fontWeight:600}}>Loading your data from Google Drive...</div>
  </div>;

  return <div style={{minHeight:'100vh',background:'#f7f5f0'}}>
    {/* HEADER */}
    <div className="no-print" style={{background:'#1a1714',color:'#faf8f3',padding:'0 1.5rem',display:'flex',alignItems:'center',justifyContent:'space-between',height:58,position:'sticky',top:0,zIndex:100,gap:10,flexWrap:'wrap'}}>
      <div style={{fontWeight:800,fontSize:17}}>{(state.profile.studentName||'My Student').split(' ')[0]}'s <span style={{color:theme.a,fontStyle:'italic'}}>Portal</span></div>
      <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
        <SaveBadge/>
        {user&&<div style={{display:'flex',alignItems:'center',gap:8}}>
          {user.picture&&<img src={user.picture} alt={user.name} style={{width:28,height:28,borderRadius:'50%',border:'2px solid rgba(255,255,255,0.2)'}}/>}
          <span style={{fontSize:12,color:'rgba(255,255,255,0.7)'}}>{user.name}</span>
        </div>}
        <Btn onClick={()=>window.print()} style={{background:'rgba(255,255,255,0.1)',color:'#faf8f3'}}>🖨 Print</Btn>
        <Btn onClick={()=>{setQlSubj(state.subjects[0]);setQl(true);}} style={{background:theme.a,color:'#fff'}}>+ Log Today</Btn>
        <Btn onClick={()=>{sessionStorage.removeItem('hs_token');onSignOut();}} style={{background:'rgba(255,255,255,0.08)',color:'rgba(255,255,255,0.6)',fontSize:11}}>Sign out</Btn>
      </div>
    </div>

    {/* NAV */}
    <div className="no-print" style={{background:'#fff',borderBottom:'1px solid #e8e2d9',display:'flex',padding:'0 1.5rem',overflowX:'auto'}}>
      {PAGES.map(p=><button key={p} onClick={()=>setPage(p)} style={{padding:'12px 16px',fontSize:13,fontWeight:600,color:page===p?theme.a:'#8a847c',background:'none',border:'none',borderBottom:`2px solid ${page===p?theme.a:'transparent'}`,cursor:'pointer',whiteSpace:'nowrap',transition:'all 0.15s'}}>{p}</button>)}
    </div>

    {/* CONTENT */}
    <div style={{padding:'1.5rem',maxWidth:1200,margin:'0 auto'}}>{pages[page]}</div>

    {/* QUICK LOG MODAL */}
    {ql&&<div onClick={()=>setQl(false)} style={{position:'fixed',inset:0,background:'rgba(26,23,20,0.55)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:16,padding:'1.75rem',maxWidth:440,width:'92%',maxHeight:'85vh',overflowY:'auto'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}><div style={{fontWeight:700,fontSize:18}}>Log Today</div><button onClick={()=>setQl(false)} style={{background:'none',border:'none',cursor:'pointer',fontSize:18,color:'#8a847c'}}>x</button></div>
        <div style={{fontSize:12,color:'#8a847c',marginBottom:16}}>{today.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
        <ST>Attendance</ST>
        <div style={{display:'flex',gap:8,marginBottom:16}}>{[['Present','present','#2a7a6f'],['Absent','absent','#b85c5c'],['Excused','excused',theme.a]].map(([l,v,c])=><Btn key={v} onClick={()=>{logAtt(v);setQl(false);}} style={{background:c+'18',color:c,border:`1px solid ${c}44`,flex:1,justifyContent:'center'}}>{l}</Btn>)}</div>
        <ST>Quick Grade</ST>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr auto',gap:8,marginBottom:16}}><Sel value={qlSubj} onChange={setQlSubj}>{state.subjects.map(s=><option key={s}>{s}</option>)}</Sel><Inp value={qlScore} onChange={setQlScore} type="number" placeholder="Score %"/><Btn onClick={qGrade} style={{background:theme.a,color:'#fff'}}>Add</Btn></div>
        <ST>Today's Win</ST>
        <div style={{display:'flex',gap:8,marginBottom:16}}><Inp value={qlWin} onChange={setQlWin} placeholder="Something great today..."/><Btn onClick={()=>{qWin();}} style={{background:theme.a,color:'#fff',flexShrink:0}}>Add</Btn></div>
        <Btn onClick={()=>setQl(false)} style={{background:theme.a,color:'#fff',width:'100%',justifyContent:'center',padding:'10px'}}>Done</Btn>
      </div>
    </div>}
  </div>;
}

// ── ROOT ──
function App(){
  const [token,setToken]=useState(()=>sessionStorage.getItem('hs_token')||null);
  const [user,setUser]=useState(null);

  useEffect(()=>{
    if(token){
      // Fetch user info
      fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+token}})
        .then(r=>r.json()).then(setUser).catch(()=>{});
    }
  },[token]);

  if(!token) return <SignInPage onToken={setToken}/>;
  return <MainApp token={token} user={user} onSignOut={()=>{setToken(null);setUser(null);}}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
